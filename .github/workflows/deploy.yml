name: CMS Deploy — Firebase Hosting

# ============================================================
# TRIGGERS: repository_dispatch (dois tipos)
#
# 1. cms-deploy    → Rebuild e redeploy do site (conteúdo atualizado)
# 2. update-template → Atualiza o template, incrementa versão e redeploy
#
# Disparar via painel admin ou manualmente (workflow_dispatch).
#
# Exemplo cURL — update-template:
#   curl -X POST \
#     -H "Authorization: token $PAT" \
#     -H "Accept: application/vnd.github.everest-preview+json" \
#     https://api.github.com/repos/OWNER/REPO/dispatches \
#     -d '{"event_type":"update-template"}'
# ============================================================
on:
  repository_dispatch:
    types:
      - cms-deploy
      - update-template

  # Permite disparar manualmente pela UI do GitHub também
  workflow_dispatch:
    inputs:
      site_id:
        description: 'ID do site no Firestore (ex: meu-site)'
        required: false
        default: 'default'
      event_type:
        description: 'Tipo de evento (cms-deploy | update-template)'
        required: false
        default: 'cms-deploy'

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build Astro SSG → Deploy Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout do repositório (com token para permitir push de volta)
      # ------------------------------------------------------------------ #
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------ #
      # 2. Bump de versão automático (apenas para update-template)
      #    Incrementa o patch de public/version.json e commita ao repo.
      # ------------------------------------------------------------------ #
      - name: 🔖 Bump de versão do template
        if: github.event.action == 'update-template' || inputs.event_type == 'update-template'
        run: |
          # Lê versão atual
          CURRENT=$(node -p "require('./public/version.json').version")
          echo "Versão atual: $CURRENT"

          # Incrementa patch (ex: 1.0.0 → 1.0.1)
          NEW=$(node -e "
            const [ma,mi,pa] = '$CURRENT'.split('.').map(Number);
            console.log(ma + '.' + mi + '.' + (pa + 1));
          ")
          echo "Nova versão: $NEW"

          # Escreve o novo version.json
          node -e "
            const fs = require('fs');
            fs.writeFileSync(
              './public/version.json',
              JSON.stringify({ version: '$NEW', releasedAt: new Date().toISOString().slice(0,10) }, null, 2) + '\n'
            );
          "

          # Configura git e commita
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json
          git commit -m "chore: bump template version to $NEW [skip ci]"
          git push
          echo "VERSION_BUMPED=$NEW" >> $GITHUB_ENV

      # ------------------------------------------------------------------ #
      # 2. Setup Node.js com cache de dependências
      # ------------------------------------------------------------------ #
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ------------------------------------------------------------------ #
      # 3. Instalar dependências (npm ci para build determinístico)
      # ------------------------------------------------------------------ #
      - name: 📦 Instalar dependências
        run: npm ci

      # ------------------------------------------------------------------ #
      # 4. Build Astro (SSG)
      #    No build time, lib/firestore.ts lê o documento único do Firestore.
      #    Variáveis de ambiente injetadas via secrets do GitHub.
      # ------------------------------------------------------------------ #
      - name: 🏗️ Build Astro SSG
        run: npm run build
        env:
          # Caminho do documento no Firestore (ex: "sites/meu-site")
          FIRESTORE_DOCUMENT_PATH: sites/${{ github.event.client_payload.site_id || inputs.site_id || 'default' }}
          # JSON da Service Account do Firebase (base64-decoded pelo utilitário)
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      # ------------------------------------------------------------------ #
      # 5. Deploy para Firebase Hosting
      #    Usa o CLI oficial do Firebase (firebase-tools).
      #    REGRA: sem Cloud Functions (plano gratuito).
      # ------------------------------------------------------------------ #
      - name: 🚀 Deploy para Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          channelId: live
          # O projectId será lido do .firebaserc automaticamente
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      # ------------------------------------------------------------------ #
      # 6. Resumo do deploy no GitHub Actions
      # ------------------------------------------------------------------ #
      - name: 📋 Resumo do Deploy
        if: success()
        run: |
          EVENT="${{ github.event.action || inputs.event_type || github.event_name }}"
          echo "## ✅ Deploy concluído com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Evento:** \`${EVENT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ação:** $([ "$EVENT" = 'update-template' ] && echo 'Atualização de template' || echo 'Deploy de conteúdo')" >> $GITHUB_STEP_SUMMARY
          echo "- **Site ID:** \`${{ github.event.client_payload.site_id || inputs.site_id || 'default' }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${VERSION_BUMPED}" ]; then
            echo "- **Nova versão:** \`${VERSION_BUMPED}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

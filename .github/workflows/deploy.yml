name: CMS Deploy — Firebase Hosting

# ============================================================
# TRIGGERS: repository_dispatch (dois tipos)
#
# 1. cms-deploy       → Rebuild e redeploy (conteúdo atualizado)
# 2. update-template  → Atualiza template, bumpa versão e redeploy
#
# client_payload.bump_type: "patch" | "minor" | "major" (default: patch)
#
# Exemplo cURL — update-template (minor bump):
#   curl -X POST \
#     -H "Authorization: token $PAT" \
#     -H "Accept: application/vnd.github.everest-preview+json" \
#     https://api.github.com/repos/OWNER/REPO/dispatches \
#     -d '{"event_type":"update-template","client_payload":{"bump_type":"minor"}}'
# ============================================================
on:
  repository_dispatch:
    types:
      - cms-deploy
      - update-template

  workflow_dispatch:
    inputs:
      site_id:
        description: 'ID do site no Firestore (ex: meu-site)'
        required: false
        default: 'default'
      event_type:
        description: 'Tipo de evento (cms-deploy | update-template)'
        required: false
        default: 'cms-deploy'
      bump_type:
        description: 'Tipo de bump semântico (patch | minor | major)'
        required: false
        default: 'patch'

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build Astro SSG → Deploy Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout com token para permitir push de volta
      # ------------------------------------------------------------------ #
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------ #
      # 2. Bump de versão semântico (apenas para update-template)
      #    Suporta patch / minor / major via client_payload.bump_type
      # ------------------------------------------------------------------ #
      - name: 🔖 Bump de versão do template
        if: github.event.action == 'update-template' || inputs.event_type == 'update-template'
        run: |
          # Lê versão atual
          CURRENT=$(node -p "require('./public/version.json').version")
          echo "Versão atual: $CURRENT"

          # Determina o tipo de bump: client_payload > workflow_dispatch input > padrão "patch"
          BUMP_TYPE="${{ github.event.client_payload.bump_type || inputs.bump_type || 'patch' }}"
          echo "Tipo de bump: $BUMP_TYPE"

          # Calcula nova versão
          NEW=$(node -e "
            const [ma, mi, pa] = '$CURRENT'.split('.').map(Number);
            const bump = '$BUMP_TYPE';
            if (bump === 'major') console.log((ma + 1) + '.0.0');
            else if (bump === 'minor') console.log(ma + '.' + (mi + 1) + '.0');
            else console.log(ma + '.' + mi + '.' + (pa + 1));
          ")
          echo "Nova versão: $NEW"

          # Escreve version.json atualizado
          node -e "
            const fs = require('fs');
            fs.writeFileSync(
              './public/version.json',
              JSON.stringify({
                version: '$NEW',
                bump_type: '$BUMP_TYPE',
                releasedAt: new Date().toISOString().slice(0, 10)
              }, null, 2) + '\n'
            );
          "

          # Configura git e commita
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json
          git commit -m "chore: bump template version to $NEW ($BUMP_TYPE) [skip ci]"
          git push
          echo "VERSION_BUMPED=$NEW" >> $GITHUB_ENV
          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_ENV

      # ------------------------------------------------------------------ #
      # 3. Setup Node.js com cache de dependências
      # ------------------------------------------------------------------ #
      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ------------------------------------------------------------------ #
      # 4. Instalar dependências
      # ------------------------------------------------------------------ #
      - name: 📦 Instalar dependências
        run: npm ci

      # ------------------------------------------------------------------ #
      # 5. Build Astro SSG
      # ------------------------------------------------------------------ #
      - name: 🏗️ Build Astro SSG
        run: npm run build
        env:
          FIRESTORE_DOCUMENT_PATH: sites/${{ github.event.client_payload.site_id || inputs.site_id || 'default' }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Senha do painel admin (SHA-256 calculado no build)
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # ------------------------------------------------------------------ #
      # 6. Deploy para Firebase Hosting
      # ------------------------------------------------------------------ #
      - name: 🚀 Deploy para Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      # ------------------------------------------------------------------ #
      # 7. Resumo do deploy
      # ------------------------------------------------------------------ #
      - name: 📋 Resumo do Deploy
        if: success()
        run: |
          EVENT="${{ github.event.action || inputs.event_type || github.event_name }}"
          echo "## ✅ Deploy concluído com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Evento:** \`${EVENT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ação:** $([ "$EVENT" = 'update-template' ] && echo 'Atualização de template' || echo 'Deploy de conteúdo')" >> $GITHUB_STEP_SUMMARY
          echo "- **Site ID:** \`${{ github.event.client_payload.site_id || inputs.site_id || 'default' }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${VERSION_BUMPED}" ]; then
            echo "- **Nova versão:** \`${VERSION_BUMPED}\` (bump: \`${BUMP_TYPE}\`)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
